name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v

      - name: Validate data integrity
        env:
          PYTHONPATH: src
        run: |
          python -c "
          from hrdaya.validate import validate_data_dir
          from pathlib import Path
          errors = validate_data_dir(Path('data'))
          if errors:
              for path, errs in errors.items():
                  for e in errs:
                      print(f'ERROR: {e}')
              raise SystemExit(f'{len(errors)} file(s) with validation errors')
          print('All data files valid.')
          "
